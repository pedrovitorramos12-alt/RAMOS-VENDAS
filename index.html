<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Meu Produto</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    h1 {
      color: #333;
    }

    p {
      color: #555;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 25px;
      background-color: #28a745;
      color: white;
      text-decoration: none;
      font-size: 18px;
      border-radius: 5px;
    }

    .btn:hover {
      background-color: #218838;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🔥 Nome do Seu Produto</h1>

    <img src="https://via.placeholder.com/600x300" alt="Imagem do Produto">

    <p>
      Aqui você coloca a descrição do seu produto. 
      Fale dos benefícios, vantagens e por que a pessoa deve comprar.
    </p>

    <h2>💰 Apenas R$49,90</h2>

    <a href="https://seulinkdecompra.com" class="btn">
      Comprar Agora
    </a>
  </div>

</body>
</html>
